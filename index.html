<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Patrick+Hand+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles.css">
    <script type="text/javascript" src="scripts/script.js"></script>
    <title>Lichess Analyzer</title>
  </head>
  <body>
    <h1 id="text">Lichess Analyzer</h1>
    <div class="input-group">
      <input type="text" id="input-text" name="input-text" class="input interface-text" value="Enter Lichess username">
      <a id="submit-button" class="button interface-text">Submit</a>
    </div>

    <h2 class="info">PLAYTIME</h2>
    <div class="information-group">
      <div class="information-box info">
        <h3>Total Play Time</h3>
        <p class="information-text" id="playtime">6</p>
        <p class="unit-text" id="playtime-unit">hrs</p>
      </div>
      <div class="information-box info">
        <h3>Account Lifetime</h3>
        <p class="information-text" id="lifetime">100</p>
        <p class="unit-text">days</p>
      </div>
    </div>

    <h2 class="info">RATINGS</h2>
    <div class="information-group">
      <div class="information-box info">
        <h3>Bullet</h3>
        <p class="information-text" id="bullet-rating">400</p>
      </div>
      <div class="information-box info">
        <h3>Blitz</h3>
        <p class="information-text" id="blitz-rating">700</p>
      </div>
      <div class="information-box info">
        <h3>Rapid</h3>
        <p class="information-text" id="rapid-rating">1900</p>
      </div>
    </div>
  </body>
</html>
